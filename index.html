<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Henna ❤️</title>

<style>
body {
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#ffdde1,#ee9ca7,#ffd1dc);
overflow-x:hidden;
cursor: url('cursor.cur') 16 16, auto;
transition:0.5s;
}

/* 🌙 night mode */
.dark {
background: linear-gradient(135deg,#1e1e2f,#3a3a5a);
color:white;
}

/* intro */
#intro {
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background: linear-gradient(135deg,#ffdde1,#ee9ca7);
z-index:999;
}

/* main */
.container {
max-width:850px;
margin:60px auto;
padding:25px;
text-align:center;
background:rgba(255,255,255,0.3);
border-radius:25px;
backdrop-filter:blur(10px);
display:none;
}

/* typing */
#typing {
white-space:pre-line;
line-height:1.8;
}

/* 💌 polaroid photos */
.gallery {
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
}
.polaroid {
background:white;
padding:10px 10px 25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transform:rotate(-2deg);
}
.polaroid img {
width:150px;
border-radius:5px;
}
.polaroid:nth-child(2){transform:rotate(2deg);}
.polaroid:nth-child(3){transform:rotate(-1deg);}

/* buttons */
button {
margin-top:10px;
padding:10px 20px;
border:none;
background:#ff4d6d;
color:white;
border-radius:25px;
cursor:pointer;
}

/* hearts */
@keyframes floatUp {
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

/* 💬 floating texts */
.float-text {
position:fixed;
color:#ff4d6d;
font-size:14px;
animation: floatUp 6s linear;
pointer-events:none;
}
</style>
</head>

<body>

<div id="intro">
<h2>Tap to open your birthday surprise 🎁</h2>
<button id="openBtn">Open 💖</button>
</div>

<audio id="bgmusic" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<div class="container" id="mainContent">

<h1>Happy Birthday Henna ❤️</h1>

<button id="letterBtn">Read my letter 💌</button>
<button id="musicBtn">Pause Music 🎵</button>
<button id="modeBtn">🌙 Toggle Mode</button>

<div id="typing"></div>

<div class="gallery">
<div class="polaroid"><img src="photo1.jpeg"></div>
<div class="polaroid"><img src="photo2.jpeg"></div>
<div class="polaroid"><img src="photo3.jpeg"></div>
</div>

<button id="playBtn">Tap this 💌</button>
<div id="secret" style="display:none;">I WILL ALWAYS BE URS ❤️</div>

</div>

<script>
window.onload=function(){

const message = `MY HZU,

I cant imagine spending a single day without you, ik we have our ups and downs but ever since we've met i love life, everything about you feels so unreal that sometimes i question that even if ur real or not, your love makes me feel the emotions i never knew existed...

I Love you and always will in this life and others as well...

Im sorry for hurting you whenever i did and i promise ill makeup for everything 

Forever yours,
Ayandu ❤️`;

/* ✨ typewriter */
function typeWriter(){
let i=0;
let el=document.getElementById("typing");
el.textContent="";
function step(){
if(i<message.length){
el.textContent += message.charAt(i);
i++;
setTimeout(step,12);
}
}
step();
}

/* open */
openBtn.onclick=function(){
intro.style.display="none";
mainContent.style.display="block";
bgmusic.volume=0.2;
bgmusic.play();
};

/* letter */
letterBtn.onclick=typeWriter;

/* 💌 secret */
playBtn.onclick=function(){
secret.style.display="block";
};

/* 🎵 music control */
musicBtn.onclick=function(){
if(bgmusic.paused){
bgmusic.play();
musicBtn.innerText="Pause Music 🎵";
}else{
bgmusic.pause();
musicBtn.innerText="Play Music 🎵";
}
};

/* 🌙 mode toggle */
modeBtn.onclick=function(){
document.body.classList.toggle("dark");
};

/* 💖 hearts */
setInterval(()=>{
let h=document.createElement("div");
h.innerHTML="💖";
h.style.position="fixed";
h.style.left=Math.random()*100+"vw";
h.style.bottom="-20px";
h.style.fontSize="20px";
h.style.animation="floatUp 6s linear";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},400);

/* 💬 floating cute texts */
const texts=["I love you 💗","Forever us 💖","My favorite person 💕"];
setInterval(()=>{
let t=document.createElement("div");
t.className="float-text";
t.innerText=texts[Math.floor(Math.random()*texts.length)];
t.style.left=Math.random()*100+"vw";
t.style.bottom="-20px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),6000);
},1500);

};
</script>

</body>
</html>
