<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Henna ❤️</title>

<style>
body {
margin: 0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg, #ffdde1, #ee9ca7, #ffd1dc);
overflow-x: hidden;

/* 🖱️ cursor */
cursor: url('cursor.cur'), url('heart.png'), auto;
}

/* 🎁 intro */
#intro {
position: fixed;
top:0; left:0;
width:100%; height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background: linear-gradient(135deg, #ffdde1, #ee9ca7);
z-index:999;
}

#intro button {
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
}

/* 💖 hearts */
@keyframes floatUp {
0% {transform:translateY(0); opacity:1;}
100% {transform:translateY(-110vh); opacity:0;}
}

/* ✨ glow title */
h1 {
color:#ff3d6e;
animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
from { text-shadow: 0 0 5px #ff4d6d; }
to { text-shadow: 0 0 20px #ff4d6d, 0 0 30px #ff99aa; }
}

/* main */
.container {
max-width:850px;
margin:60px auto;
padding:25px;
text-align:center;
background:rgba(255,255,255,0.3);
border-radius:25px;
backdrop-filter: blur(10px);
display:none;
}

#typing {
font-size:18px;
line-height:1.8;
white-space:pre-line;
}

/* slideshow */
.gallery img {
width:100%;
border-radius:15px;
transition: opacity 1s ease;
}

/* buttons */
button {
margin-top:20px;
padding:12px 25px;
border:none;
background:#ff4d6d;
color:white;
border-radius:25px;
cursor:pointer;
}

#secret {display:none;}

/* 💗 side boxes */
@keyframes floatBox {
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.side-box {
position:fixed;
top:30%;
width:160px;
padding:15px;
background:rgba(255,255,255,0.6);
border-radius:20px;
backdrop-filter:blur(10px);
color:#ff3d6e;
animation: floatBox 4s infinite;
}

.side-box:hover {
box-shadow:0 0 25px rgba(255,77,109,0.8);
}

.left-box{left:10px;}
.right-box{right:10px;}

@media(max-width:768px){
.side-box{display:none;}
}
</style>
</head>

<body>

<div id="intro">
<h2>Tap to open your birthday surprise 🎁</h2>
<button id="openBtn">Open 💖</button>
</div>

<audio id="bgmusic" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<div class="side-box left-box">my girl 💗</div>
<div class="side-box right-box">forever us 💖</div>

<div class="container" id="mainContent">

<h1>Happy Birthday Henna ❤️</h1>

<div id="typing"></div>

<div class="gallery">
<img id="slide" src="photo1.jpeg">
</div>

<button id="playBtn">Tap this 💌</button>

<div id="secret">You mean everything to me ❤️</div>

</div>

<script>
window.onload = function(){

const message = `MY HZU,

I cant imagine spending a single day without you...

Forever yours,
Ayandu ❤️`;

/* typewriter */
function typeWriter(){
let i=0;
let el=document.getElementById("typing");
function step(){
if(i<message.length){
el.innerHTML+=message[i];
i++;
setTimeout(step,18);
}
}
step();
}

/* open */
document.getElementById("openBtn").onclick=function(){
document.getElementById("intro").style.display="none";
document.getElementById("mainContent").style.display="block";

let music=document.getElementById("bgmusic");
music.volume=0.2;
music.play();

typeWriter();
};

/* button */
document.getElementById("playBtn").onclick=function(){
document.getElementById("secret").style.display="block";
};

/* 💖 floating hearts */
setInterval(()=>{
let h=document.createElement("div");
h.innerHTML="💖";
h.style.position="fixed";
h.style.left=Math.random()*100+"vw";
h.style.bottom="-20px";
h.style.fontSize="20px";
h.style.animation="floatUp 6s linear";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},400);

/* 🎞️ slideshow */
let images=["photo1.jpeg","photo2.jpeg","photo3.jpeg"];
let i=0;
setInterval(()=>{
i=(i+1)%images.length;
document.getElementById("slide").src=images[i];
},3000);

/* 🖱️ cursor trail */
document.addEventListener("mousemove", e=>{
let t=document.createElement("div");
t.innerHTML="💗";
t.style.position="fixed";
t.style.left=e.clientX+"px";
t.style.top=e.clientY+"px";
t.style.pointerEvents="none";
t.style.opacity=0.7;
t.style.fontSize="14px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),500);
});

};
</script>

</body>
</html>
