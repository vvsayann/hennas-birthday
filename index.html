<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Henna ❤️</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#ffdde1,#ee9ca7,#ffd1dc);
overflow:hidden;
cursor: url('cursor.cur') 16 16, auto;
transition:0.5s;
text-align:center;
color:#333;
}

/* screens */
.screen{
position:absolute;
top:0;left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.6s;
}

.active{
opacity:1;
pointer-events:auto;
}

/* glow */
.glow{
color:#ff3d6e;
text-shadow:0 0 10px #ff4d6d;
}

/* button */
button{
padding:12px 25px;
border:none;
background:#ff4d6d;
color:white;
border-radius:25px;
cursor:pointer;
margin-top:15px;
}

/* typing */
#typing{
max-width:80%;
line-height:1.8;
}

/* polaroid */
.gallery{
display:flex;
gap:15px;
}
.polaroid{
background:white;
padding:10px 10px 25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
.polaroid img{width:120px;}

/* hearts */
@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}
</style>
</head>

<body>

<audio id="bgmusic" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
<h2>Tap to open your birthday surprise 🎁</h2>
<button onclick="next(1)">Open 💖</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
<h1 class="glow">Happy Birthday Henna ❤️</h1>
<button onclick="next(2)">Continue ➡️</button>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
<div id="typing"></div>
<button onclick="next(3)">Next 💌</button>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="s4">
<div class="gallery">
<div class="polaroid"><img src="photo1.jpeg"></div>
<div class="polaroid"><img src="photo2.jpeg"></div>
<div class="polaroid"><img src="photo3.jpeg"></div>
</div>
<button onclick="next(4)">Final ❤️</button>
</div>

<!-- SCREEN 5 -->
<div class="screen" id="s5">
<h1 class="glow">I WILL ALWAYS BE URS ❤️</h1>
</div>

<script>
const music = document.getElementById("bgmusic");

/* story flow */
function next(n){
document.getElementById("s"+n).classList.remove("active");
document.getElementById("s"+(n+1)).classList.add("active");

/* start music + typing on first click */
if(n===1){
music.volume=0.2;
music.play();
typeWriter();
}
}

/* typewriter */
const message = `MY HZU,

I cant imagine spending a single day without you... everything feels better with you.

I Love you and always will ❤️`;

function typeWriter(){
let i=0;
let el=document.getElementById("typing");
el.innerHTML="";
function step(){
if(i < message.length){
let char = message[i];
if(char === "\n"){ el.innerHTML += "<br>"; }
else{ el.innerHTML += char; }
i++;
setTimeout(step,20);
}
}
step();
}

/* hearts */
setInterval(()=>{
let h=document.createElement("div");
h.innerHTML="💖";
h.style.position="fixed";
h.style.left=Math.random()*100+"vw";
h.style.bottom="0";
h.style.animation="floatUp 6s linear";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},500);

/* cursor trail */
document.addEventListener("mousemove",function(e){
let heart=document.createElement("div");
heart.innerHTML="💖";
heart.style.position="fixed";
heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";
heart.style.pointerEvents="none";
heart.style.transition="0.6s";
document.body.appendChild(heart);
setTimeout(()=>{
heart.style.transform="translateY(-20px)";
heart.style.opacity="0";
},10);
setTimeout(()=>heart.remove(),600);
});
</script>

</body>
</html>
