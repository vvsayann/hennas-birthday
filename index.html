<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Henna ❤️</title>

<style>
body {
margin: 0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg, #ffdde1, #ee9ca7, #ffd1dc);
overflow-x: hidden;
}

/* 🎁 INTRO */
#intro {
position: fixed;
top:0; left:0;
width:100%; height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background: linear-gradient(135deg, #ffdde1, #ee9ca7);
z-index:999;
text-align:center;
}

#intro button {
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
margin-top:15px;
}

/* 💖 hearts animation */
@keyframes floatUp {
0% {transform:translateY(0); opacity:1;}
100% {transform:translateY(-110vh); opacity:0;}
}

/* MAIN CONTENT */
.container {
max-width:850px;
margin:60px auto;
padding:25px;
text-align:center;
background:rgba(255,255,255,0.3);
border-radius:25px;
backdrop-filter: blur(10px);
display:none; /* hidden initially */
}

h1 { color:#ff3d6e; }

#typing {
font-size:18px;
line-height:1.8;
white-space:pre-line;
}

.gallery {
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.gallery img {
width:100%;
border-radius:15px;
}

button {
margin-top:20px;
padding:12px 25px;
border:none;
background:#ff4d6d;
color:white;
border-radius:25px;
cursor:pointer;
}

#secret {
display:none;
margin-top:15px;
}

@media(max-width:768px){
.gallery{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:480px){
.gallery{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- 🎁 INTRO -->
<div id="intro">
<h2>Tap to open your birthday surprise 🎁</h2>
<button id="openBtn">Open 💖</button>
</div>

<audio id="bgmusic" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<div class="container" id="mainContent">
<h1>Happy Birthday Henna ❤️</h1>

<div id="typing"></div>

<div class="gallery">
<img src="photo1.jpeg">
<img src="photo2.jpeg">
<img src="photo3.jpeg">
</div>

<button id="playBtn">Tap this 💌</button>

<div id="secret">I love you more every day. — Ayan ❤️</div>
</div>

<script>

window.onload = function() {

/* 💌 FULL MESSAGE */
const message = `MY HZU,

I cant imagine spending a single day without you, ik we have our ups and downs but ever since we've met i love life, everything about you feels so unreal that sometimes i question that even if ur real or not, your love makes me feel the emotions i never knew existed, ik we both are very short tempered have flaws but the way we always try n make it up n all is obv that we are meant to be together, I promise ill be the best bf now and will act just as how you like, will never give u a chance to complain and be bad at me bs daikho aap ab

I Love you and always will in this life and others as well, if i could get chance to relive life i'd want you to be my gf in every. There is something about you that makes life livable, enjoyable, happy and most importantly makes life look different. I never knew someone could have this much impact on me but for 2 years we've met everything is just better man

Im sorry for hurting you whenever i did and i promise ill makeup for everything 

Forever yours,
Ayandu ❤️`;

/* ✨ TYPEWRITER */
function typeWriter() {
let i = 0;
let el = document.getElementById("typing");
el.innerHTML = "";

function step() {
if (i < message.length) {
el.innerHTML += message.charAt(i);
i++;
setTimeout(step, 18);
}
}
step();
}

/* 🎁 OPEN BUTTON */
document.getElementById("openBtn").onclick = function() {
document.getElementById("intro").style.display = "none";
document.getElementById("mainContent").style.display = "block";

/* play music */
document.getElementById("bgmusic").play();

/* start typing */
typeWriter();
};

/* 💌 SECOND BUTTON */
document.getElementById("playBtn").onclick = function() {
document.getElementById("secret").style.display = "block";
};

/* 💖 FLOATING HEARTS */
setInterval(()=>{
let heart=document.createElement("div");
heart.innerHTML="💖";

heart.style.position="fixed";
heart.style.left=Math.random()*100+"vw";
heart.style.bottom="-20px";
heart.style.fontSize=(Math.random()*20+15)+"px";
heart.style.opacity=Math.random();
heart.style.animation="floatUp 6s linear";

document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);

},400);

};

</script>

</body>
</html>
